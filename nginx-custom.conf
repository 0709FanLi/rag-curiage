map $http_user_agent $site_prefix {
    default /pc;
    ~*(android|iphone|ipad|ipod|mobile|micromessenger) /m;
}

server {
    listen 80;
    server_name healthy.curiage.com localhost;
    root /usr/share/nginx/html;

    # Allow large file uploads (default is 1m). Give gateway headroom; app layer enforces strict limits.
    client_max_body_size 110m;

    # 说明：
    # 之前为支持“动态 DNS 解析”在 proxy_pass 中使用变量，并硬编码了 podman 的 resolver IP。
    # 但该 IP 可能随网络变化而变化，导致 /api 请求卡在 resolver_timeout（默认 5s），从而触发前端 5s 超时。
    # 这里改为直接 proxy_pass 到 service name，避免 resolver 依赖（容器 DNS 会处理服务名解析）。

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- SPA 静态资源 ---
    # 目录结构：
    # - /usr/share/nginx/html/pc/  (PC 前端 dist)
    # - /usr/share/nginx/html/m/   (移动 H5 前端 dist)

    location ^~ /pc/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /pc/index.html;
    }

    location ^~ /m/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /m/index.html;
    }

    # 根路径按 UA 分流到 /m/ 或 /pc/，并保留原路径（使用 try_files 避免 rewrite/break 导致 404）
    location / {
        try_files $site_prefix$uri $site_prefix$uri/ $site_prefix/index.html;
    }

    # Proxy API requests to backend
    location /api {
        # 注意：docker-compose/podman-compose 的容器 DNS 默认以「服务名」提供解析，
        # 这里必须用服务名 backend，而不是 container_name（healthy-rag-backend），
        # 否则会出现：host not found in upstream "healthy-rag-backend"
        proxy_pass http://backend:8000;

        # Stream request body to upstream (avoid buffering large uploads to disk)
        proxy_request_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long-running reports
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
